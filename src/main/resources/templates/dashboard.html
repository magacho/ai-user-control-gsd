<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="en">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Page header -->
    <div class="mb-8">
        <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">Dashboard</h1>
        <p class="text-sm text-gray-500 mt-1">Welcome to AI User Control</p>
    </div>

    <!-- Stats cards -->
    <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-lg border border-gray-200 p-5">
            <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Total Users</div>
            <div class="mt-2 text-2xl font-semibold text-gray-900" th:text="${userCount != null ? userCount : 0}">0</div>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 p-5">
            <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">AI Tools</div>
            <div class="mt-2 text-2xl font-semibold text-gray-900" th:text="${toolCount != null ? toolCount : 0}">0</div>
        </div>
        <div class="bg-white rounded-lg border border-gray-200 p-5">
            <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Active Accounts</div>
            <div class="mt-2 text-2xl font-semibold text-gray-900">0</div>
        </div>
    </div>

    <!-- Empty state -->
    <div class="bg-white rounded-lg border border-gray-200 p-8 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z" />
        </svg>
        <h3 class="text-base font-medium text-gray-900 mb-1">Get started with AI User Control</h3>
        <p class="text-sm text-gray-500 mb-5 max-w-md mx-auto">
            Configure AI tools to start monitoring usage. Users will be discovered automatically from provider APIs.
        </p>
        <a th:href="@{/ai-tools}"
           class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-gray-900 text-white text-sm font-medium rounded-md hover:bg-gray-800 transition-colors duration-150">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Configure AI Tools
        </a>
    </div>
</div>
</body>
</html>
