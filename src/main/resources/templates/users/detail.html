<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="en">
<head>
    <title th:text="${user.name != null ? user.name : 'User Detail'}">User Detail</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Breadcrumb -->
    <div class="mb-6">
        <nav class="flex items-center gap-2 text-sm text-gray-500">
            <a th:href="@{/users}" class="hover:text-gray-700 transition-colors duration-150">Users</a>
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
            <span class="text-gray-900" th:text="${user.name ?: user.email}">User Name</span>
        </nav>
    </div>

    <!-- Profile section -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
        <div class="flex items-start gap-6">
            <!-- Avatar -->
            <div class="flex-shrink-0">
                <img th:if="${user.avatarUrl != null}" th:src="${user.avatarUrl}"
                     class="h-20 w-20 rounded-full object-cover" referrerpolicy="no-referrer"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div th:if="${user.avatarUrl == null}"
                     class="h-20 w-20 rounded-full bg-gray-200 flex items-center justify-center">
                    <span class="text-2xl font-medium text-gray-500"
                          th:text="${user.name != null ? user.name.substring(0,1).toUpperCase() : '?'}">?</span>
                </div>
                <div class="hidden h-20 w-20 rounded-full bg-gray-200 items-center justify-center">
                    <span class="text-2xl font-medium text-gray-500"
                          th:text="${user.name != null ? user.name.substring(0,1).toUpperCase() : '?'}">?</span>
                </div>
            </div>

            <!-- User info -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-xl font-semibold text-gray-900 truncate" th:text="${user.name ?: 'Unknown'}">User Name</h1>
                    <span th:if="${user.status == 'ACTIVE'}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Active</span>
                    <span th:if="${user.status == 'INACTIVE'}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">Inactive</span>
                    <span th:if="${user.status == 'OFFBOARDED'}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Offboarded</span>
                </div>
                <p class="text-sm text-gray-500 mb-4" th:text="${user.email}">email@example.com</p>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Department</dt>
                        <dd class="mt-1 text-sm text-gray-900" th:text="${user.department ?: '-'}">-</dd>
                    </div>
                    <div>
                        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">GitHub Username</dt>
                        <dd class="mt-1 text-sm" th:classappend="${user.githubUsername != null ? 'text-gray-900' : 'text-gray-400'}"
                            th:text="${user.githubUsername ?: 'Not set'}">Not set</dd>
                    </div>
                    <div>
                        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Created</dt>
                        <dd class="mt-1 text-sm text-gray-900" th:text="${user.createdAtFormatted}">-</dd>
                    </div>
                    <div>
                        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wider">Last Login</dt>
                        <dd class="mt-1 text-sm text-gray-900" th:text="${user.lastLoginFormatted}">Never</dd>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Linked accounts section -->
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Linked Tool Accounts</h2>
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600"
                  th:text="${user.accounts != null ? user.accounts.size() : 0}">0</span>
        </div>

        <div id="accounts-table">
            <div th:replace="~{users/fragments/accounts-table :: accountsTable}"></div>
        </div>
    </div>
</div>
</body>
</html>
