<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="toolTable">
    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(tools)}" class="bg-white rounded-lg border border-gray-200 p-8 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437 1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008Z" />
        </svg>
        <h3 class="text-base font-medium text-gray-900 mb-1">No AI tools configured yet</h3>
        <p class="text-sm text-gray-500 mb-5 max-w-sm mx-auto">
            Add your first tool to begin monitoring usage.
        </p>
        <button type="button"
                hx-get="/ai-tools/new"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-gray-900 text-white text-sm font-medium rounded-md hover:bg-gray-800 transition-colors duration-150">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Add AI Tool
        </button>
    </div>

    <!-- Data table -->
    <div th:if="${!#lists.isEmpty(tools)}" class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr th:each="tool : ${tools}" class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-3">
                            <div class="h-8 w-8 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0">
                                <img th:src="${tool.toolType.iconPath}" th:alt="${tool.toolType.displayName}"
                                     class="h-5 w-5" />
                            </div>
                            <div>
                                <div class="text-sm font-medium text-gray-900" th:text="${tool.name}">Tool Name</div>
                                <div th:if="${tool.description}" class="text-xs text-gray-500 truncate max-w-xs" th:text="${tool.description}">Description</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-1.5">
                            <img th:src="${tool.toolType.iconPath}" th:alt="${tool.toolType.displayName}"
                                 class="h-5 w-5 flex-shrink-0" />
                            <span class="text-xs font-medium text-gray-700" th:text="${tool.toolType.displayName}">TYPE</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span th:if="${tool.enabled}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Enabled</span>
                        <span th:if="${!tool.enabled}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500">Disabled</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button type="button"
                                    th:attr="hx-get=${'/ai-tools/' + tool.id + '/edit'}"
                                    hx-target="#modal-container"
                                    hx-swap="innerHTML"
                                    class="text-sm text-gray-500 hover:text-gray-900 transition-colors duration-150">
                                Edit
                            </button>
                            <span class="text-gray-300">|</span>
                            <button type="button"
                                    th:attr="hx-delete=${'/ai-tools/' + tool.id}"
                                    hx-target="#tool-table"
                                    hx-swap="innerHTML"
                                    hx-confirm="Are you sure you want to delete this tool?"
                                    class="text-sm text-red-500 hover:text-red-700 transition-colors duration-150">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
