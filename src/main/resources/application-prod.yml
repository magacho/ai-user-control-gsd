spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    cache: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-stacktrace: never
    include-exception: false
  servlet:
    session:
      cookie:
        secure: true

# Stricter logging in production
logging:
  level:
    root: WARN
    com.bemobi.aiusercontrol: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/ai-user-control/application.log

# Swagger disabled in production
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# Production specific settings
app:
  scheduler:
    usage-metrics-collection:
      enabled: true
    inactive-accounts-check:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: never
