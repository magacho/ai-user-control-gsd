version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiusercontrol-postgres
    environment:
      POSTGRES_DB: aiusercontrol
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aiusercontrol-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aiusercontrol-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bemobi.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - aiusercontrol-network
    depends_on:
      - postgres
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aiusercontrol-app
    environment:
      SPRING_PROFILE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/aiusercontrol
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    ports:
      - "8080:8080"
    networks:
      - aiusercontrol-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - with-app

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  aiusercontrol-network:
    driver: bridge
