<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="userTable">
    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(users)}" class="bg-white rounded-lg border border-gray-200 p-8 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
        </svg>
        <h3 class="text-base font-medium text-gray-900 mb-1">No users discovered yet</h3>
        <p class="text-sm text-gray-500 max-w-sm mx-auto">
            Users will appear here once AI tool integrations are configured and synced.
        </p>
    </div>

    <!-- Data table -->
    <div th:if="${!#lists.isEmpty(users)}" class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Department</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Git Login</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Login</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr th:each="user : ${users}" class="hover:bg-gray-50 cursor-pointer"
                    th:onclick="'window.location.href=\'/users/' + ${user.id} + '\''">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <a th:href="@{/users/{id}(id=${user.id})}" class="flex items-center gap-3" onclick="event.stopPropagation();">
                            <img th:if="${user.avatarUrl != null}" th:src="${user.avatarUrl}"
                                 class="h-8 w-8 rounded-full object-cover" referrerpolicy="no-referrer"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div th:if="${user.avatarUrl == null}" class="h-8 w-8 rounded-full bg-gray-200 flex items-center justify-center">
                                <span class="text-xs font-medium text-gray-500" th:text="${user.name != null ? user.name.substring(0,1).toUpperCase() : '?'}">?</span>
                            </div>
                            <div class="hidden h-8 w-8 rounded-full bg-gray-200 items-center justify-center">
                                <span class="text-xs font-medium text-gray-500" th:text="${user.name != null ? user.name.substring(0,1).toUpperCase() : '?'}">?</span>
                            </div>
                            <span class="text-sm font-medium text-gray-900 hover:text-indigo-600" th:text="${user.name ?: 'Unknown'}">Name</span>
                        </a>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${user.email}">email@example.com</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${user.department ?: '-'}">Department</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${user.githubUsername ?: '-'}">Git Login</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span th:if="${user.status == 'ACTIVE'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Active</span>
                        <span th:if="${user.status == 'INACTIVE'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">Inactive</span>
                        <span th:if="${user.status == 'OFFBOARDED'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Offboarded</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"
                        th:text="${user.lastLoginFormatted}">Never</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
