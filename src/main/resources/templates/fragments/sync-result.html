<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="syncResult">
    <!-- Success toast -->
    <div th:if="${syncSuccess}" id="sync-toast"
         class="rounded-lg border border-green-200 bg-green-50 p-4 mb-4">
        <div class="flex items-start">
            <div class="flex-shrink-0">
                <svg class="h-5 w-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
                </svg>
            </div>
            <div class="ml-3 flex-1">
                <h3 class="text-sm font-medium text-green-800">Sync completo</h3>
                <div class="mt-1 text-sm text-green-700">
                    <p th:text="'Usuarios: ' + ${syncResult.newUsers} + ' novos, ' + ${syncResult.updatedUsers} + ' atualizados, ' + ${syncResult.offboardedUsers} + ' offboarded'"></p>
                    <p th:text="'Contas vinculadas: ' + ${syncResult.linkedAccounts} + ' vinculadas, ' + ${syncResult.unmatchedAccounts} + ' sem correspondencia'"></p>
                </div>
            </div>
            <div class="ml-auto pl-3">
                <button type="button" onclick="this.closest('#sync-toast').remove()"
                        class="inline-flex rounded-md bg-green-50 p-1.5 text-green-500 hover:bg-green-100 transition-colors duration-150">
                    <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
                    </svg>
                </button>
            </div>
        </div>
        <!-- Show non-critical errors in success state -->
        <div th:if="${syncResult.errors != null && !syncResult.errors.isEmpty()}" class="mt-3 border-t border-green-200 pt-3">
            <p class="text-sm font-medium text-yellow-700">Avisos:</p>
            <ul class="mt-1 text-sm text-yellow-600 list-disc list-inside">
                <li th:each="error : ${syncResult.errors}" th:text="${error}"></li>
            </ul>
        </div>
    </div>

    <!-- Error/partial failure toast -->
    <div th:if="${!syncSuccess}" id="sync-toast"
         class="rounded-lg border border-red-200 bg-red-50 p-4 mb-4">
        <div class="flex items-start">
            <div class="flex-shrink-0">
                <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
                </svg>
            </div>
            <div class="ml-3 flex-1">
                <h3 class="text-sm font-medium text-red-800">Erros durante o sync</h3>
                <div class="mt-1 text-sm text-red-700">
                    <ul class="list-disc list-inside">
                        <li th:each="error : ${syncResult.errors}" th:text="${error}"></li>
                    </ul>
                </div>
            </div>
            <div class="ml-auto pl-3">
                <button type="button" onclick="this.closest('#sync-toast').remove()"
                        class="inline-flex rounded-md bg-red-50 p-1.5 text-red-500 hover:bg-red-100 transition-colors duration-150">
                    <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Auto-dismiss after 10 seconds -->
    <script>
        setTimeout(function() {
            var toast = document.getElementById('sync-toast');
            if (toast) {
                toast.style.transition = 'opacity 300ms ease-out';
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);
            }
        }, 10000);
    </script>
</div>
</body>
</html>
