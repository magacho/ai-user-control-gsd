<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="pendingAccountsTable">
    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(pendingAccounts)}" class="bg-white rounded-lg border border-gray-200 p-8 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
        <h3 class="text-base font-medium text-gray-900 mb-1">Nenhuma conta pendente</h3>
        <p class="text-sm text-gray-500 max-w-sm mx-auto">
            Todas as contas de ferramentas estao vinculadas a usuarios ativos.
        </p>
    </div>

    <!-- Data table -->
    <div th:if="${!#lists.isEmpty(pendingAccounts)}" class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tool</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Account</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reason</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr th:each="account : ${pendingAccounts}" class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium text-gray-900" th:text="${account.toolName}">Tool</span>
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-700"
                                  th:text="${account.toolType}">TYPE</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${account.accountIdentifier}">identifier</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${account.accountEmail ?: '-'}">email</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span th:if="${account.reason == 'Sem correspondencia'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-orange-100 text-orange-700"
                              th:text="${account.reason}">Sem correspondencia</span>
                        <span th:if="${account.reason == 'Offboarded'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700"
                              th:text="${account.reason}">Offboarded</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div th:if="${account.userName != null}">
                            <div class="text-sm text-gray-900" th:text="${account.userName}">Name</div>
                            <div class="text-xs text-gray-500" th:text="${account.userEmail}">email</div>
                        </div>
                        <span th:if="${account.userName == null}" class="text-sm text-gray-400">&mdash;</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
