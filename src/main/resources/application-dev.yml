spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aiusercontrol
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    session:
      cookie:
        secure: false

logging:
  level:
    root: INFO
    com.bemobi.aiusercontrol: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Swagger/OpenAPI enabled in dev
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Development specific settings
app:
  scheduler:
    usage-metrics-collection:
      enabled: false  # Disable scheduled tasks in dev
    inactive-accounts-check:
      enabled: false
