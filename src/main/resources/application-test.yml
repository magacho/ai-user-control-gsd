spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

  h2:
    console:
      enabled: true

# Test specific settings
logging:
  level:
    root: INFO
    com.bemobi.aiusercontrol: DEBUG
    org.springframework.test: DEBUG

app:
  scheduler:
    usage-metrics-collection:
      enabled: false
    inactive-accounts-check:
      enabled: false

