<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<div th:fragment="accountsTable">
    <!-- Empty state -->
    <div th:if="${user.accounts == null || user.accounts.isEmpty()}" class="bg-white rounded-lg border border-gray-200 p-8 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244" />
        </svg>
        <h3 class="text-base font-medium text-gray-900 mb-1">No linked accounts</h3>
        <p class="text-sm text-gray-500 max-w-sm mx-auto">
            Run a sync to discover and link AI tool accounts for this user.
        </p>
    </div>

    <!-- Data table -->
    <div th:if="${user.accounts != null && !user.accounts.isEmpty()}" class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tool</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Account</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Seen</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr th:each="account : ${user.accounts}" class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center gap-2">
                            <img th:if="${account.toolTypeIcon}" th:src="${account.toolTypeIcon}" th:alt="${account.toolType}"
                                 class="h-5 w-5 flex-shrink-0" />
                            <span class="text-sm font-medium text-gray-900" th:text="${account.toolName}">Tool</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${account.accountIdentifier}">identifier</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${account.accountEmail ?: '-'}">email</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span th:if="${account.status == 'ACTIVE'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Active</span>
                        <span th:if="${account.status == 'SUSPENDED'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700">Suspended</span>
                        <span th:if="${account.status == 'REVOKED'}"
                              class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Revoked</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${account.lastSeenFormatted}">-</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <button type="button"
                                th:attr="hx-delete=${'/users/' + user.id + '/accounts/' + account.id}"
                                hx-target="#accounts-table"
                                hx-swap="innerHTML"
                                hx-confirm="Are you sure you want to unlink this account?"
                                class="text-sm text-red-500 hover:text-red-700 transition-colors duration-150">
                            Unlink
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
